---
default_stages: [pre-commit, pre-push]
minimum_prek_version: "0.2.22"
default_language_version:
  python: python3
  node: 24.14.1
exclude: |
  (?x)^(
    \.git/|
    \.next/|
    node_modules/|
    bun\.lock|
    next-env\.d\.ts|
    package-lock\.json$
  )

repos:
  - repo: meta
    hooks:
      - id: identity
        name: Run identity
        description: Run the identity check
      - id: check-hooks-apply
        name: run check-hooks-apply
        description: check that all the hooks apply to the repository

  #  - repo: https://github.com/thlorenz/doctoc.git
  #    rev: v2.3.0
  #    hooks:
  #      - id: doctoc
  #        name: add TOC for Markdown files
  #        description: automatically keeps your table of contents up to date
  #       files: ^README\.md$

  - repo: local
    hooks:
      - id: check-zip-file-is-not-committed
        name: check no zip files are committed
        description: Zip files are not allowed in the repository
        language: fail
        entry: |
          Zip files are not allowed in the repository as they are hard to
          track and have security implications. Please remove the zip file from the repository.
        files: (?i)\.zip$
      - id: bun-install
        name: run bun install
        description: Ensure that the bun dependencies can install
        entry: bun install
        language: system
        pass_filenames: false
      - id: validate-dependabot-yml
        name: validate dependabot.yml
        description: ensures the dependabot config file is valid
        entry: validate-dependabot-yaml
        language: node
        additional_dependencies: ['@bugron/validate-dependabot-yaml@0.3.3']
        files: ^\.github/dependabot\.yml$

  # GO-based
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: Run gitleaks
        description: Check for secrets with gitleaks

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        name: run codespell
        description: check spelling with codespell
        args: [--config=.github/linters/.codespellrc]

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: chmod
        name: Set file permissions
        description: Does not run on Windows so setup as a manual hook
        args: ["644"]
        files: \.md$
        stages: [manual]

  - repo: https://github.com/oxipng/oxipng
    rev: v10.1.0
    hooks:
      - id: oxipng
        name: run oxipng
        description: check PNG files with oxipng
        args: ['--fix', '-o', '4', '--strip', 'safe', '--alpha']
        stages: [manual]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: run trailing-whitespace
        description: trims trailing whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        name: run end-of-file-fixer
        description: makes sure files end in a newline and only a newline
      - id: fix-byte-order-marker
        name: run fix-byte-order-marker
        description: removes UTF-8 byte order marker
      - id: forbid-submodules
        name: run forbid-submodules
        description: forbids any submodules in the repository
      - id: check-yaml
        name: run check-yaml
        description: attempts to load all yaml files to verify syntax
      - id: check-added-large-files
        name: run check-added-large-files
        description: prevent giant files from being committed
        args: ['--maxkb=7750']
      - id: check-json
        name: run check-json
        description: check JSON files for syntax errors
      - id: check-merge-conflict
        name: run check-merge-conflict
        description: check for merge conflict markers
      - id: check-case-conflict
        name: run check-case-conflict
        description: check for case conflicts in file names
      - id: check-illegal-windows-names
        name: run check-illegal-windows-names
        description: check for Windows-illegal file names
      - id: check-vcs-permalinks
        name: run check-vcs-permalinks
        description: ensures that links to vcs websites are permalinks
      - id: detect-aws-credentials
        name: run detect-aws-credentials
        description: checks for the existence of AWS secrets that you have set up with the AWS CLI
        args: [--allow-missing-credentials]
      - id: detect-private-key
        name: run detect-private-key
        description: checks for the existence of private keys
      - id: mixed-line-ending
        name: run mixed-line-ending
        description: replaces or checks mixed line ending

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: text-unicode-replacement-char
        name: run check for no unicode replacement char
        description: Forbid files which have a UTF-8 Unicode replacement character

  - repo: https://github.com/biomejs/pre-commit
    rev: "v2.4.10"
    hooks:
      - id: biome-check
        name: run biome-check
        description: Run Biome linter and formatter for JSON files
        additional_dependencies: ["@biomejs/biome"]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        name: run actionlint
        description: actionlint is a static checker for GitHub Actions workflow files

  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.6.1
    hooks:
      - id: editorconfig-checker
        name: run editorconfig-checker
        description: a tool to verify that your files are in harmony with your .editorconfig
        alias: ec

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v10.2.0
    hooks:
      - id: eslint
        name: run eslint
        description: ESLint statically analyzes your code to quickly find problems.
        entry: eslint --config eslint.config.mjs --fix
        language: node
        files: \.(js|mjs|cjs|ts|mts|cts|jsx|tsx)$

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        name: run markdownlint
        description: check Markdown files with markdownlint
        args: [--config=.github/linters/.markdown-lint.yml]
        types: [markdown]
        files: \.md$

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: run yamllint
        description: check YAML files with yamllint
        args: [--strict, -c=.github/linters/.yaml-lint.yml]
        types: [yaml]
        files: \.ya?ml$
        exclude: '(^|/)(docker-compose.*\.ya?ml)$'

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.23.1
    hooks:
      - id: zizmor
        name: run zizmor
        description: zizmor is a static analysis tool for GitHub Actions
        # args: [--config=.github/linters/zizmor.yml]
        files: ^\.github/workflows/.*$
        types: [yaml]

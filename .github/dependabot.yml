---
version: 2
updates:
  - package-ecosystem: 'bun'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 3
    groups:
      bun-dependencies:
        patterns:
          - '*'
    cooldown:
      default-days: 7

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 3
    groups:
      github-actions-dependencies:
        patterns:
          - '*'
    cooldown:
      default-days: 7

  - package-ecosystem: pip
    directory: /
    open-pull-requests-limit: 3
    schedule:
      interval: weekly
    groups:
      pip-dependencies:
        patterns:
          - '*'
    cooldown:
      default-days: 7

  - package-ecosystem: 'pre-commit'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 3
    groups:
      pre-commit-hooks:
        patterns:
          - '*'
    cooldown:
      default-days: 7
